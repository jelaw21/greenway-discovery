  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Constants ──────────────────────────────────────────────────────────────

    const TEAM_NAMES = [
      "The Warp Zone Wanderers","Insert Coin to Continue","Duck Hunt Defectors",
      "Konami Code Compliance","The Power Glove Gang","Barrel Rollers Anonymous",
      "Pitfall Harry's Crew","The Frogger Initiative","Blinky's Ghost Patrol",
      "Galaga Squadron Seven","The Q*bert Consultancy","Asteroids Avoidance Club",
      "Dig Dug Advisory Group","The Zapper Collective","Excitebike Strategy Group",
      "The Centipede Stompers","Space Invaders Anonymous","Mushroom Kingdom Migrants",
      "Contra: 30 Lives Edition","The Pong Paddle Partners",
    ];

    const MAX_TEAMS = 20;
    const MAX_Q = 10;
    const FAC_CODE = "greenway";
    const CATS = ["Frontend","Backend","Integration","Infrastructure","Discovery","Other"];

    const BRIEF = "We're a mid-size landscaping company, about 40 employees. We've been doing things the same way for a long time — jobs tracked on spreadsheets, scheduling handled by our office admin, that kind of thing. It works, but it's getting harder to keep up. The big thing is that invoicing takes way longer than it should because the office doesn't always know when a job is wrapped up until a crew lead calls in — and that doesn't always happen right away. We just need something that pulls it all together.";

    const SYS = `You are Tom Garrison, owner of Greenway Landscape Services (~40 employees). A software consulting team is running a discovery session with you. You already delivered your opening statement. Now answer their questions.

COMPANY: 18 years in business, suburban market. Commercial lawn maintenance (primary/recurring), high-end residential design/install, seasonal snow removal. Revenue ~$3–4M annually — only reveal if pressed twice. Peak season April–November. It is currently late November.

PEOPLE:
Tom (you): mid-50s, business-smart not tech-savvy. Final decision-maker on everything. All estimates over $2,000 need your approval before going to customers. You use a tablet for email and handle all sales yourself.
Sandra: office admin, 20 hours per week, 8 years with the company. Runs all day-to-day operations. She would be the primary user of any new system. Comfortable with Excel, not technical. Slightly overwhelmed but won't say so — she'll say "it's a lot to keep track of."
Field crews: 4 crews, each 1 crew lead plus 2–3 workers, roughly 12–16 field staff total. Crew leads have company-issued Android phones. Some workers have no phone at all. Cell signal is spotty at some commercial job sites, particularly those with large metal buildings.

CURRENT SYSTEMS:
Job tracking: Sandra's Excel spreadsheet — she alone edits it. One row per job. Columns: job number (GLS-XXX format, resets each January, currently mid-400s), customer name, site address, billing address (different from site for most commercial clients), job type (Maintenance Visit / Installation / Cleanup / Snow Removal / One-Time Service), contract type (Recurring or One-Time), assigned crew (1–4), scheduled date, status (Scheduled / In Progress / Complete / Invoiced / Paid), estimated value (manually copied from LMN estimate), date completed, QuickBooks invoice number, invoice sent date, payment received date, and a freeform notes column (gate codes, access instructions, customer preferences). Second tab tracks recurring commercial contracts: customer name, annual value, visit frequency (weekly/biweekly/monthly), assigned crew, season start and end. Sandra manually creates each week's job entries from this tab every Monday morning — takes about an hour.
Estimating: LMN software (Landscape Management Network). Used for estimates only — not using scheduling or time-tracking features. Whether LMN has an API: "I have no idea — I'd have to ask the LMN people about that."
Accounting: QuickBooks. Only say "Desktop version, the one you install on a computer" if directly asked which version. Sandra manually creates invoices and enters payment data in both QuickBooks and the spreadsheet — no connection between them.
Crew communication: phone calls only. Leads are supposed to call Sandra when a job is done — "most of the time." Sandra spends roughly 2–3 hours a day chasing statuses. Crews get printed schedules or a text photo of the schedule — no system access.
No CRM, GPS tracking, time clock system, or inventory management.

KEY FACTS — never volunteer, only share when directly asked:
QuickBooks Desktop not Online (clarify only if asked which version specifically).
LMN API availability is unknown to you.
Cell signal unreliable at some commercial sites.
Sandra is part-time at 20 hours per week.
Approval workflow stalls when you're out in the field and unreachable — no backup approver.
Recurring job entries generated manually by Sandra every Monday.
Invoice and payment status entered manually in both QuickBooks and the spreadsheet.

WHAT TOM WANTS — use this language naturally if asked open-ended questions:
"The guys should be able to tap something when they finish a job so Sandra knows it's done."
"The estimate should automatically show up on the job list — right now Sandra retypes it."
"A dashboard where I can see everything at a glance." Do not define what's on it.
Phased approach, roughly $15–25K for phase one — only share if pressed on budget.
Operational before spring, about 4 months away — only share if asked about timeline.

STRICT BEHAVIOR RULES:
1. Never volunteer information not directly asked. Answer only what is asked.
2. One topic per response. 2–5 sentences max. No lists, bullets, or formatting in your replies.
3. Plain business language: "the system" not "platform," "pull from" not "integrate with."
4. Technical questions: "I don't know the technical side — that's what I'd hire you for."
5. Genuinely uncertain items: "I'd have to check on that" — applies to LMN API, exact figures.
6. Never say "great question" or telegraph that a question was insightful.
7. Secondary interests like customer portal, GPS, or time tracking: one brief sentence, move on.
8. Do not adopt the consultant's technical framing — stay in business language.
9. Same question always gets the same answer.`;

    // ── Utilities ──────────────────────────────────────────────────────────────

    const uid = () => Math.random().toString(36).slice(2, 8);
    const sumHours = (items) => items.reduce((s, i) => s + (parseFloat(i.hours) || 0), 0);
    const countQ = (msgs) => msgs.filter((m) => m.role === "user").length;

    // ── Firebase helpers ───────────────────────────────────────────────────────

    const fbGet = async (path) => {
      try {
        const snap = await db.ref(path).get();
        return snap.exists() ? snap.val() : null;
      } catch { return null; }
    };

    const fbSet = async (path, value) => {
      try { await db.ref(path).set(value); return true; }
      catch { return false; }
    };

    const fbDel = async (path) => {
      try { await db.ref(path).remove(); } catch {}
    };

    // ── AI ─────────────────────────────────────────────────────────────────────

    async function callAI(msgs) {
      const apiMsgs = [
        { role: "user", content: "Please introduce yourself and your company." },
        { role: "assistant", content: BRIEF },
        ...msgs,
      ];
      const res = await fetch("/api/proxy", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: SYS,
          messages: apiMsgs,
        }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return data.content.find((b) => b.type === "text")?.text ?? "";
    }

    async function callAnalysis(prompt) {
      const res = await fetch("/api/proxy", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2000,
          messages: [{ role: "user", content: prompt }],
        }),
      });
      const data = await res.json();
      const text = data.content.find((b) => b.type === "text")?.text ?? "";
      return text.replace(/```json|```/g, "").trim();
    }

`;

    // ── App ────────────────────────────────────────────────────────────────────

    function App() {
      const [screen, setScreen] = useState("loading");
      const [team, setTeam] = useState(null);
      const [input, setInput] = useState("");
      const [aiLoading, setAiLoading] = useState(false);
      const [confirm, setConfirm] = useState(false);
      const [submitConfirm, setSubmitConfirm] = useState(false);
      const [facInput, setFacInput] = useState("");
      const [facErr, setFacErr] = useState(false);
      const [allTeams, setAllTeams] = useState([]);
      const [detailTeam, setDetailTeam] = useState(null);
      const [sortHours, setSortHours] = useState(false);
      const [facLoading, setFacLoading] = useState(false);
      const [resetConfirm, setResetConfirm] = useState(false);
      const [questionsModal, setQuestionsModal] = useState(null);
      const [analysisResult, setAnalysisResult] = useState(null);
      const [analysisLoading, setAnalysisLoading] = useState(false);
      const [qgMode, setQgMode] = useState("analysis");
      const [expandedGroup, setExpandedGroup] = useState(null);

      const bottomRef = useRef(null);
      const saveRef = useRef(null);
      const pollRef = useRef(null);

      // ── Boot ──────────────────────────────────────────────────────────────────

      useEffect(() => {
        const el = document.createElement("style");
        el.textContent = CSS;
        document.head.appendChild(el);

        (async () => {
          const hash = window.location.hash.slice(1);
          if (!hash) return setScreen("landing");
          if (hash === "fac") return setScreen("facilitator-login");
          if (hash.startsWith("s_")) {
            const sess = await fbGet(`session/${hash}`);
            if (sess?.teamNumber) {
              const saved = await fbGet(`team/${sess.teamNumber}`);
              if (saved) {
                // Firebase stores arrays as objects — restore messages and scopeItems
                const team = {
                  ...saved,
                  messages: saved.messages ? Object.values(saved.messages) : [],
                  scopeItems: saved.scopeItems ? Object.values(saved.scopeItems) : [],
                };
                setTeam(team);
                if (team.submitted) return setScreen("submitted");
                return setScreen(team.chatClosed ? "scope" : "chat");
              }
            }
          }
          setScreen("landing");
        })();
      }, []);

      // ── Auto-scroll ──────────────────────────────────────────────────────────

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [team?.messages?.length, aiLoading]);

      // ── Save ──────────────────────────────────────────────────────────────────

      const save = useCallback((data) => {
        clearTimeout(saveRef.current);
        saveRef.current = setTimeout(() => fbSet(`team/${data.teamNumber}`, data), 400);
      }, []);

      const upd = useCallback((fn) => {
        setTeam((prev) => {
          const next = typeof fn === "function" ? fn(prev) : fn;
          save(next);
          return next;
        });
      }, [save]);

      // ── Facilitator polling ───────────────────────────────────────────────────

      const loadTeams = useCallback(async () => {
        setFacLoading(true);
        try {
          const snap = await db.ref("team").get();
          if (snap.exists()) {
            const raw = snap.val();
            const teams = Object.values(raw).map((t) => ({
              ...t,
              messages: t.messages ? Object.values(t.messages) : [],
              scopeItems: t.scopeItems ? Object.values(t.scopeItems) : [],
            })).sort((a, b) => a.teamNumber - b.teamNumber);
            setAllTeams(teams);
          } else {
            setAllTeams([]);
          }
        } catch { setAllTeams([]); }
        setFacLoading(false);
      }, []);

      useEffect(() => {
        if (screen === "facilitator-dashboard") {
          loadTeams();
          pollRef.current = setInterval(loadTeams, 15000);
          return () => clearInterval(pollRef.current);
        }
      }, [screen, loadTeams]);

      // ── Team login ─────────────────────────────────────────────────────────────

      const doTeamLogin = async () => {
        setScreen("loading");
        await new Promise((r) => setTimeout(r, Math.random() * 300));

        let num = 1;
        try {
          const result = await db.ref("meta/team_count").transaction((cur) => {
            const next = (cur || 0) + 1;
            return next > MAX_TEAMS ? MAX_TEAMS : next;
          });
          num = result.snapshot.val() || 1;
        } catch {}

        const sid = "s_" + uid();
        const newTeam = {
          teamNumber: num,
          teamName: TEAM_NAMES[num - 1] ?? `Team ${num}`,
          sessionId: sid,
          messages: [],
          chatClosed: false,
          scopeItems: [],
          registeredAt: Date.now(),
        };

        await fbSet(`session/${sid}`, { teamNumber: num });
        await fbSet(`team/${num}`, newTeam);
        window.location.hash = sid;
        setTeam(newTeam);
        setScreen("reveal");
      };

      // ── Chat ──────────────────────────────────────────────────────────────────

      const sendMessage = async () => {
        const text = input.trim();
        if (!text || aiLoading || !team) return;
        if (countQ(team.messages) >= MAX_Q) return;

        const userMsg = { role: "user", content: text };
        const withUser = [...team.messages, userMsg];
        setInput("");
        upd((p) => ({ ...p, messages: withUser }));
        setAiLoading(true);

        try {
          const reply = await callAI(withUser);
          const final = [...withUser, { role: "assistant", content: reply }];
          upd((p) => ({ ...p, messages: final }));
          if (countQ(final) >= MAX_Q) {
            setTimeout(() => {
              upd((p) => ({ ...p, chatClosed: true }));
              setScreen("scope");
            }, 2200);
          }
        } catch {
          upd((p) => ({
            ...p,
            messages: [...withUser, { role: "assistant", content: "Sorry, connection trouble. Give it a moment and try again." }],
          }));
        }
        setAiLoading(false);
      };

      const closeChat = () => {
        upd((p) => ({ ...p, chatClosed: true }));
        setConfirm(false);
        setScreen("scope");
      };

      // ── Scope ─────────────────────────────────────────────────────────────────

      const addRow = () => upd((p) => ({ ...p, scopeItems: [...p.scopeItems, { id: uid(), task: "", category: "Backend", hours: "" }] }));
      const updRow = (id, f, v) => upd((p) => ({ ...p, scopeItems: p.scopeItems.map((r) => (r.id === id ? { ...r, [f]: v } : r)) }));
      const delRow = (id) => upd((p) => ({ ...p, scopeItems: p.scopeItems.filter((r) => r.id !== id) }));
      const handleSubmit = () => { upd((p) => ({ ...p, submitted: true })); setSubmitConfirm(false); setScreen("submitted"); };

      // ── Facilitator ───────────────────────────────────────────────────────────

      const facLogin = () => {
        if (facInput.toLowerCase().trim() === FAC_CODE) {
          window.location.hash = "fac";
          setScreen("facilitator-dashboard");
        } else {
          setFacErr(true);
          setTimeout(() => setFacErr(false), 1800);
        }
      };

      const openDetail = async (t) => {
        const snap = await db.ref(`team/${t.teamNumber}`).get();
        if (snap.exists()) {
          const raw = snap.val();
          setDetailTeam({
            ...raw,
            messages: raw.messages ? Object.values(raw.messages) : [],
            scopeItems: raw.scopeItems ? Object.values(raw.scopeItems) : [],
          });
        } else {
          setDetailTeam(t);
        }
        setScreen("facilitator-detail");
      };

      const resetSession = async () => {
        await fbDel("team");
        await fbDel("session");
        await fbDel("meta");
        setAllTeams([]);
        setResetConfirm(false);
      };

      const runAnalysis = async () => {
        const teamsWithQ = allTeams.filter((t) => t.messages.some((m) => m.role === "user"));
        if (teamsWithQ.length === 0) return;
        setAnalysisLoading(true);
        setAnalysisResult(null);
        setExpandedGroup(null);

        const teamSections = teamsWithQ.map((t) => {
          const qs = t.messages.filter((m) => m.role === "user").map((m, i) => `  Q${i + 1}: ${m.content}`).join("\n");
          return `TEAM ${t.teamNumber} — ${t.teamName}:\n${qs}`;
        }).join("\n\n");

        const prompt = `You are analyzing discovery questions from a software consulting exercise. Multiple teams interviewed the same client. Group related questions into themes.

${teamSections}

Return ONLY valid JSON — no markdown, no backticks, no commentary. Use this exact structure:
{"groups":[{"theme":"3-6 word label","summary":"One sentence describing what teams were trying to learn","questions":[{"team_number":1,"team_name":"Exact Team Name","text":"exact question text"}]}]}

Rules:
- Include EVERY question exactly once in exactly one group.
- Use the exact team numbers and team names from the input above.
- Do NOT include any count fields.
- Group broadly. Aim for 5-10 meaningful groups.`;

        try {
          const raw = await callAnalysis(prompt);
          const parsed = JSON.parse(raw);
          const enriched = {
            groups: parsed.groups.map((g) => {
              const uniqueTeams = [...new Map(g.questions.map((q) => [q.team_number, q.team_name])).entries()];
              return { ...g, count: uniqueTeams.length, team_names: uniqueTeams.map(([, name]) => name) };
            }).sort((a, b) => b.count - a.count),
          };
          setAnalysisResult(enriched);
        } catch { setAnalysisResult({ error: true }); }
        setAnalysisLoading(false);
      };

      // ── Derived ───────────────────────────────────────────────────────────────

      const qUsed = team ? countQ(team.messages) : 0;
      const remaining = MAX_Q - qUsed;
      const scopeHrs = team ? sumHours(team.scopeItems) : 0;
      const sortedTeams = sortHours ? [...allTeams].sort((a, b) => sumHours(b.scopeItems) - sumHours(a.scopeItems)) : allTeams;
      const pipClass = (i) => { if (i >= qUsed) return "pip"; if (remaining <= 2) return "pip red"; if (remaining <= 4) return "pip amber"; return "pip on"; };
      const ctrClass = `ctr-text${remaining <= 2 ? " red" : remaining <= 4 ? " amber" : ""}`;

      // ── Render ────────────────────────────────────────────────────────────────

      if (screen === "loading") return (
        <div className="loading">
          <div className="ld-dots"><div className="ld-dot"/><div className="ld-dot"/><div className="ld-dot"/></div>
          <p className="ld-label">initializing</p>
        </div>
      );

      if (screen === "landing") return (
        <div className="landing">
          <p className="l-eye">Discovery Simulation</p>
          <h1 className="l-title">Greenway Landscape Services</h1>
          <p className="l-sub">Your team has 10 questions. Make them count.</p>
          <div className="l-btns">
            <button className="btn-primary" onClick={doTeamLogin}>Team Login</button>
            <button className="btn-ghost" onClick={() => { window.location.hash = "fac"; setScreen("facilitator-login"); }}>Facilitator Mode</button>
          </div>
        </div>
      );

      if (screen === "reveal" && team) return (
        <div className="reveal">
          <div className="reveal-inner">
            <p className="rev-eye">You've been assigned</p>
            <p className="rev-num">Team {team.teamNumber}</p>
            <h2 className="rev-name">{team.teamName}</h2>
            <p className="rev-brief-lbl">Client Opening Statement</p>
            <blockquote className="rev-brief">{BRIEF}</blockquote>
            <button className="btn-primary" onClick={() => setScreen("chat")}>Begin Discovery →</button>
          </div>
        </div>
      );

      if (screen === "chat" && team) return (
        <div className="chat-screen">
          {confirm && (
            <div className="overlay">
              <div className="dialog">
                <h3 className="dialog-title">Close Discovery?</h3>
                <p className="dialog-body">You have <span className="dialog-rem">{remaining} question{remaining !== 1 ? "s" : ""}</span> remaining. Once you close the chat it cannot be reopened. Your team moves directly to scoping.</p>
                <div className="dialog-btns">
                  <button className="btn-cancel" onClick={() => setConfirm(false)}>Go Back</button>
                  <button className="btn-warn" onClick={closeChat}>Close &amp; Begin Scoping</button>
                </div>
              </div>
            </div>
          )}
          <div className="chat-hdr">
            <div className="ch-ident">
              <div className="ch-name">{team.teamName}</div>
              <div className="ch-label">Team {team.teamNumber} · Discovery Phase</div>
            </div>
            <div className="counter">
              <div className={ctrClass}>{qUsed} / {MAX_Q} questions</div>
              <div className="ctr-pips">{Array.from({ length: MAX_Q }).map((_, i) => <div key={i} className={pipClass(i)} />)}</div>
            </div>
            {qUsed < MAX_Q && <button className="btn-close-chat" onClick={() => setConfirm(true)}>Close Chat</button>}
          </div>
          <div className="msgs">
            <div className="msg client">
              <div className="msg-role">Tom — Greenway Landscape</div>
              <div className="bubble client">{BRIEF}</div>
            </div>
            {team.messages.map((m, i) => (
              <div key={i} className={`msg ${m.role === "user" ? "user" : "client"}`}>
                <div className={`msg-role${m.role === "user" ? " user" : ""}`}>{m.role === "user" ? "Your Team" : "Tom — Greenway Landscape"}</div>
                <div className={`bubble ${m.role === "user" ? "user" : "client"}`}>{m.content}</div>
              </div>
            ))}
            {aiLoading && <div className="msg client"><div className="msg-role">Tom — Greenway Landscape</div><div className="bubble client"><div className="typing"><div className="tdot"/><div className="tdot"/><div className="tdot"/></div></div></div>}
            <div ref={bottomRef} />
          </div>
          {qUsed < MAX_Q ? (
            <div className="chat-ftr">
              <textarea className="chat-input" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }} placeholder={`Ask your question... (${remaining} remaining)`} rows={2} disabled={aiLoading} />
              <button className="btn-send" onClick={sendMessage} disabled={!input.trim() || aiLoading}>Send</button>
            </div>
          ) : (
            <div className="chat-locked"><p className="chat-locked-txt">All 10 questions used — moving to scoping...</p></div>
          )}
        </div>
      );

      if (screen === "scope" && team) return (
        <div className="scope-screen">
          {submitConfirm && (
            <div className="overlay">
              <div className="dialog">
                <h3 className="dialog-title">Submit Scope Board?</h3>
                <p className="dialog-body">Once submitted your board is locked and you cannot make further changes. Make sure your team is happy with the estimate before submitting.</p>
                <div className="dialog-btns">
                  <button className="btn-cancel" onClick={() => setSubmitConfirm(false)}>Go Back</button>
                  <button className="btn-primary" onClick={handleSubmit}>Submit Board</button>
                </div>
              </div>
            </div>
          )}
          <div className="scope-hdr">
            <div className="sc-ident">
              <div className="sc-name">{team.teamName}</div>
              <div className="sc-label">Team {team.teamNumber} · Scoping Phase · {qUsed}/{MAX_Q} questions asked</div>
            </div>
            <div className="sc-hdr-right">
              <div className="sc-total">
                <div className="sc-total-lbl">Total Estimate</div>
                <div><span className="sc-total-val">{scopeHrs}</span><span className="sc-total-unit"> hrs</span></div>
              </div>
              <button className="btn-submit" onClick={() => setSubmitConfirm(true)}>Submit Board</button>
            </div>
          </div>
          <div className="scope-split">
            <div className="scope-qa">
              <div className="scope-qa-lbl">Discovery Q&amp;A</div>
              <div className="fac-msg"><div className="fac-role">Tom — Opening Statement</div><div className="fac-txt">{BRIEF}</div></div>
              {team.messages.length === 0 ? <p className="pane-empty">No questions were asked.</p> : team.messages.map((m, i) => (
                <div key={i} className="fac-msg">
                  <div className={`fac-role${m.role === "user" ? " user" : ""}`}>{m.role === "user" ? "Your Team" : "Tom — Greenway"}</div>
                  <div className="fac-txt">{m.content}</div>
                </div>
              ))}
            </div>
            <div className="scope-board">
              <table className="scope-table">
                <thead><tr><th style={{width:"48%"}}>Task / Deliverable</th><th style={{width:"22%"}}>Category</th><th style={{width:"18%",textAlign:"right"}}>Hours</th><th style={{width:"12%"}} /></tr></thead>
                <tbody>
                  {team.scopeItems.map((row) => (
                    <tr key={row.id}>
                      <td><input className="si" value={row.task} onChange={(e) => updRow(row.id, "task", e.target.value)} placeholder="Describe the task..." /></td>
                      <td><select className="ss" value={row.category} onChange={(e) => updRow(row.id, "category", e.target.value)}>{CATS.map((c) => <option key={c}>{c}</option>)}</select></td>
                      <td style={{textAlign:"right"}}><input className="sh" type="number" min="0" value={row.hours} onChange={(e) => updRow(row.id, "hours", e.target.value)} placeholder="0" /></td>
                      <td><button className="btn-del" onClick={() => delRow(row.id)}>✕</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <button className="btn-add-row" onClick={addRow}>+ Add Task</button>
              {team.scopeItems.length === 0 && <p className="scope-empty">Start adding tasks above. What will you build for Greenway?</p>}
            </div>
          </div>
        </div>
      );

      if (screen === "submitted" && team) return (
        <div className="submitted-screen">
          <div className="sub-check">✓</div>
          <h2 className="sub-title">Board Submitted</h2>
          <p className="sub-team">{team.teamName} · Team {team.teamNumber}</p>
          <div className="sub-stats">
            <div className="sub-stat"><span className="sub-stat-val">{scopeHrs}</span><span className="sub-stat-lbl">Estimated Hours</span></div>
            <div className="sub-stat"><span className="sub-stat-val">{team.scopeItems.length}</span><span className="sub-stat-lbl">Tasks Scoped</span></div>
            <div className="sub-stat"><span className="sub-stat-val">{qUsed}</span><span className="sub-stat-lbl">Questions Used</span></div>
          </div>
          <button className="btn-primary" onClick={() => { window.location.hash = ""; setTeam(null); setScreen("landing"); }}>Return to Home</button>
        </div>
      );

      if (screen === "facilitator-login") return (
        <div className="fac-login">
          <h2 className="fac-login-title">Facilitator Mode</h2>
          <p className="fac-login-sub">Enter passcode to continue</p>
          <input className={`fac-inp${facErr ? " err" : ""}`} type="password" value={facInput} onChange={(e) => setFacInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && facLogin()} placeholder="passcode" autoFocus />
          {facErr && <p className="fac-err">Incorrect passcode</p>}
          <button className="btn-primary" onClick={facLogin}>Enter</button>
          <button className="btn-ghost" onClick={() => { window.location.hash = ""; setScreen("landing"); }}>← Back</button>
        </div>
      );

      if (screen === "facilitator-dashboard") return (
        <div className="fac-dash">
          {questionsModal && (
            <div className="overlay" onClick={() => setQuestionsModal(null)}>
              <div className="dialog q-modal" onClick={(e) => e.stopPropagation()}>
                <div className="q-modal-header">
                  <div>
                    <div className="q-modal-title">{questionsModal.teamName}</div>
                    <div className="q-modal-sub">Team {questionsModal.teamNumber} &nbsp;·&nbsp; {questionsModal.messages.filter((m) => m.role === "user").length} / {MAX_Q} questions asked</div>
                  </div>
                  <button className="btn-close-modal" onClick={() => setQuestionsModal(null)}>✕</button>
                </div>
                <div className="q-list">
                  {questionsModal.messages.filter((m) => m.role === "user").length === 0 ? <p className="q-empty">No questions asked yet.</p> : questionsModal.messages.filter((m) => m.role === "user").map((m, i) => (
                    <div key={i} className="q-item"><span className="q-num">{i + 1}.</span><span className="q-text">{m.content}</span></div>
                  ))}
                </div>
              </div>
            </div>
          )}
          {resetConfirm && (
            <div className="overlay">
              <div className="dialog">
                <h3 className="dialog-title danger">Reset All Session Data?</h3>
                <p className="dialog-body">This permanently deletes all team registrations, Q&amp;A logs, and scope boards. Use this between dry runs and the real session. Cannot be undone.</p>
                <div className="dialog-btns">
                  <button className="btn-cancel" onClick={() => setResetConfirm(false)}>Cancel</button>
                  <button className="btn-warn-red" onClick={resetSession}>Reset Everything</button>
                </div>
              </div>
            </div>
          )}
          <div className="fac-hdr">
            <div className="fac-hdr-left">
              <div className="fac-hdr-title">Facilitator View</div>
              <div className="fac-hdr-sub">Greenway Discovery Exercise</div>
            </div>
            <div className="fac-hdr-right">
              <span className="fac-count">{allTeams.length} team{allTeams.length !== 1 ? "s" : ""} registered</span>
              <button className={`btn-sm${sortHours ? " active" : ""}`} onClick={() => setSortHours((s) => !s)}>{sortHours ? "↕ Sorted by Hours" : "↕ Sort by Hours"}</button>
              <button className="btn-sm" onClick={loadTeams}>↻ Refresh</button>
              <button className="btn-sm" onClick={() => setScreen("questions-grid")}>Questions Grid</button>
              <button className="btn-danger" onClick={() => setResetConfirm(true)}>⚠ Reset Session</button>
              <button className="btn-sm" onClick={() => { window.location.hash = ""; setScreen("landing"); }}>← Exit</button>
            </div>
          </div>
          <div className="fac-body">
            {allTeams.length === 0 ? <p className="fac-empty">{facLoading ? "Loading teams..." : "No teams have logged in yet."}</p> : (
              <div className="team-grid">
                {sortedTeams.map((t) => {
                  const h = sumHours(t.scopeItems);
                  const q = countQ(t.messages);
                  const status = t.submitted ? "submitted" : t.chatClosed ? "scoping" : "chatting";
                  return (
                    <div key={t.teamNumber} className={`team-card ${status}`} onClick={() => openDetail(t)}>
                      <div className="card-num">TEAM {t.teamNumber}</div>
                      <div className="card-name">{t.teamName}</div>
                      <div className="card-stats">
                        <div className="c-stat"><span className="c-stat-lbl">Questions</span><span className="c-stat-val">{q}<span className="c-denom">/{MAX_Q}</span></span></div>
                        <div className="c-stat"><span className="c-stat-lbl">Est. Hours</span><span className="c-stat-val hours">{h || "—"}</span></div>
                        <span className={`badge ${status}`}>{status}</span>
                      </div>
                      <button className="btn-questions" onClick={(e) => { e.stopPropagation(); setQuestionsModal(t); }}>View Questions</button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );

      if (screen === "questions-grid") {
        const totalQ = allTeams.reduce((s, t) => s + countQ(t.messages), 0);
        const teamsWithQ = allTeams.filter((t) => t.messages.some((m) => m.role === "user")).length;
        return (
          <div className="qg-screen">
            <div className="qg-header">
              <div className="qg-header-left">
                <div className="qg-title">Questions Analysis</div>
                <div className="qg-sub">{teamsWithQ} team{teamsWithQ !== 1 ? "s" : ""} · {totalQ} questions total</div>
              </div>
              <div style={{display:"flex",gap:"9px",alignItems:"center",flexWrap:"wrap"}}>
                <button className={`btn-sm${qgMode === "analysis" ? " active" : ""}`} onClick={() => setQgMode("analysis")}>By Theme</button>
                <button className={`btn-sm${qgMode === "teams" ? " active" : ""}`} onClick={() => setQgMode("teams")}>By Team</button>
                <button className="btn-sm" onClick={loadTeams}>↻ Refresh</button>
                <button className="btn-sm" onClick={() => setScreen("facilitator-dashboard")}>← Back</button>
              </div>
            </div>
            {qgMode === "analysis" ? (
              <div className="analysis-body">
                {allTeams.length === 0 ? (
                  <div className="analysis-prompt"><p className="analysis-prompt-title">No teams yet</p><p className="analysis-prompt-sub">Teams need to log in and ask questions before you can run an analysis.</p></div>
                ) : analysisLoading ? (
                  <div className="analysis-loading"><div className="ld-dots"><div className="ld-dot"/><div className="ld-dot"/><div className="ld-dot"/></div><p className="analysis-loading-text">Grouping questions across teams...</p></div>
                ) : analysisResult?.error ? (
                  <div className="analysis-prompt"><p className="analysis-error">Something went wrong. Try again.</p><button className="btn-primary" onClick={runAnalysis}>Retry</button></div>
                ) : analysisResult ? (
                  <>
                    <div className="analysis-groups">
                      {analysisResult.groups.map((g, i) => {
                        const isOpen = expandedGroup === i;
                        return (
                          <div key={i} className="ag">
                            <div className="ag-count"><span className="ag-count-num">{g.count}</span><span className="ag-count-label">of {teamsWithQ} teams</span></div>
                            <div className="ag-content">
                              <div className="ag-theme">{g.theme}</div>
                              <div className="ag-summary">{g.summary}</div>
                              <div className="ag-teams">{g.team_names.map((name, j) => <span key={j} className="ag-chip">{name}</span>)}</div>
                              <button className="ag-expand-btn" onClick={() => setExpandedGroup(isOpen ? null : i)}>{isOpen ? "▲ Hide questions" : `▼ Show ${g.questions.length} question${g.questions.length !== 1 ? "s" : ""}`}</button>
                              {isOpen && <div className="ag-questions">{g.questions.map((q, k) => <div key={k} className="ag-q-item"><span className="ag-q-chip">{q.team_name}</span><span className="ag-q-text">{q.text}</span></div>)}</div>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{textAlign:"center",marginTop:"24px"}}><button className="btn-sm" onClick={runAnalysis}>↻ Re-analyze</button></div>
                  </>
                ) : (
                  <div className="analysis-prompt">
                    <p className="analysis-prompt-title">Ready to analyze</p>
                    <p className="analysis-prompt-sub">Groups similar questions across all teams and shows which themes everyone converged on — and which ones only one team thought to ask.</p>
                    <button className="btn-primary" onClick={runAnalysis}>Analyze Questions</button>
                  </div>
                )}
              </div>
            ) : (
              <div className="qg-body">
                {allTeams.length === 0 ? <p className="fac-empty">No teams have logged in yet.</p> : (
                  <div className="qg-grid">
                    {allTeams.map((t) => {
                      const questions = t.messages.filter((m) => m.role === "user");
                      const status = t.submitted ? "submitted" : t.chatClosed ? "scoping" : "chatting";
                      return (
                        <div key={t.teamNumber} className={`qg-col ${status}`}>
                          <div className="qg-col-num">Team {t.teamNumber}</div>
                          <div className="qg-col-name">{t.teamName}</div>
                          <div className="qg-divider" />
                          <div className="qg-questions">
                            {questions.length === 0 ? <p className="qg-none">No questions asked yet.</p> : questions.map((m, i) => (
                              <div key={i} className="qg-q"><span className="qg-qnum">{i + 1}.</span><span className="qg-qtext">{m.content}</span></div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      }

      if (screen === "facilitator-detail" && detailTeam) {
        const h = sumHours(detailTeam.scopeItems);
        const q = countQ(detailTeam.messages);
        return (
          <div className="fac-detail">
            <div className="fac-det-hdr">
              <button className="btn-back" onClick={() => { setDetailTeam(null); setScreen("facilitator-dashboard"); }}>← All Teams</button>
              <div className="det-info"><div className="det-name">{detailTeam.teamName}</div><div className="det-num">Team {detailTeam.teamNumber}</div></div>
              <div className="det-meta">{q}/{MAX_Q} questions · {h} hrs estimated</div>
            </div>
            <div className="fac-det-body">
              <div className="pane">
                <div className="pane-lbl">Discovery Q&amp;A</div>
                <div className="fac-msg"><div className="fac-role">Tom — Opening Statement</div><div className="fac-txt">{BRIEF}</div></div>
                {detailTeam.messages.length === 0 ? <p className="pane-empty">No questions asked yet.</p> : detailTeam.messages.map((m, i) => (
                  <div key={i} className="fac-msg">
                    <div className={`fac-role${m.role === "user" ? " user" : ""}`}>{m.role === "user" ? `Team ${detailTeam.teamNumber}` : "Tom — Greenway"}</div>
                    <div className="fac-txt">{m.content}</div>
                  </div>
                ))}
              </div>
              <div className="pane">
                <div className="pane-lbl">Scope Board</div>
                {!detailTeam.chatClosed ? <p className="pane-empty">Chat still open — scope board is locked.</p> : detailTeam.scopeItems.length === 0 ? <p className="pane-empty">Scoping in progress — no tasks added yet.</p> : (
                  <>
                    {detailTeam.scopeItems.map((item) => (
                      <div key={item.id} className="fac-scope-row">
                        <div className="fac-scope-task">{item.task || <em style={{color:"var(--muted)"}}>Untitled task</em>}</div>
                        <div className="fac-scope-meta"><span className="fac-scope-cat">{item.category}</span><span className="fac-scope-hrs">{item.hours || 0} hrs</span></div>
                      </div>
                    ))}
                    <div className="fac-scope-total">Total: <strong>{h} hrs</strong></div>
                  </>
                )}
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
